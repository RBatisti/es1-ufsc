services:
  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: condominio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./esquema-bd.sql:/docker-entrypoint-initdb.d/esquema-bd.sql:ro

volumes:
  postgres_data: